services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_desk
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d trading_desk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASS}@db:5432/trading_desk
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      IBKR_GATEWAY_HOST: host.docker.internal
      IBKR_GATEWAY_PORT: "5001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ../scripts:/scripts
    working_dir: /app

  celery-beat:
    build: ./agent
    restart: unless-stopped
    command: celery -A agent.tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASS}@db:5432/trading_desk
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      IBKR_GATEWAY_HOST: host.docker.internal
      IBKR_GATEWAY_PORT: "5001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agent:/app/agent
    working_dir: /app

  agent-worker:
    build: ./agent
    restart: unless-stopped
    command: celery -A agent.tasks worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASS}@db:5432/trading_desk
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      IBKR_GATEWAY_HOST: host.docker.internal
      IBKR_GATEWAY_PORT: "5001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agent:/app/agent
    working_dir: /app

  frontend:
    build: ./frontend
    restart: unless-stopped
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app

volumes:
  pgdata:
