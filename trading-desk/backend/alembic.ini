[alembic]
# path to migration scripts.
# Use forward slashes (/) also on windows to provide an OS agnostic path
script_location = alembic

# The sqlalchemy.url value is read from environment variable DATABASE_URL
# at runtime (see env.py).  The placeholder below is never used directly.
sqlalchemy.url = postgresql://admin:tradingdesk@db:5432/trading_desk

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
