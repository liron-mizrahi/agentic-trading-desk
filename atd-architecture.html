<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ATD — Architecture &amp; Pipeline</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 20px;
  }
</style>
</head>
<body>
<main>
<svg viewBox="0 0 920 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#64748b" />
    </marker>
  </defs>
  <style>
    /* Inline so SVG inherits */
    .title { font-size: 22px; font-weight: 650; fill: var(--fg); }
    .subtitle { font-size: 13px; fill: var(--muted); }
    .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
    .small { font-size: 11px; fill: var(--muted); }
    .mono { font-family: "SF Mono", ui-monospace, monospace; font-size: 11px; }
    .node { stroke: var(--line); stroke-width: 1; rx: 6; ry: 6; }
    .neutral { fill: var(--neutral); }
    .input { fill: var(--input); }
    .process { fill: var(--process); }
    .storage { fill: var(--storage); }
    .external { fill: var(--external); }
    .risk-fill { fill: var(--risk); }
    .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
    .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.85; }
    .zone-label { font-size: 11px; font-weight: 700; fill: var(--muted); letter-spacing: 0.08em; }
    .guard { fill: var(--risk); opacity: 0.12; }
    .pillar-title { font-size: 13px; font-weight: 700; fill: var(--fg); }
    .pillar-item { font-size: 11px; fill: var(--muted); }
  </style>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" class="title">Agentic Trading Desk</text>
  <text x="460" y="44" text-anchor="middle" class="subtitle">Systematic Short-Term Technical Trading Analyst</text>

  <!-- LAYER 1: INPUTS -->
  <rect class="zone" x="30" y="60" width="560" height="100" rx="8" ry="8" />
  <text x="42" y="80" class="zone-label">INPUT LAYER</text>

  <rect class="node input" x="60" y="88" width="154" height="58" />
  <text x="137" y="110" text-anchor="middle" class="label">#trading-desk</text>
  <text x="137" y="126" text-anchor="middle" class="small">Discord commands</text>
  <text x="137" y="139" text-anchor="middle" class="small">(no mention required)</text>

  <rect class="node input" x="234" y="88" width="134" height="58" />
  <text x="301" y="110" text-anchor="middle" class="label">WebChat</text>
  <text x="301" y="126" text-anchor="middle" class="small">Direct commands</text>
  <text x="301" y="139" text-anchor="middle" class="small">Control UI</text>

  <rect class="node input" x="388" y="88" width="134" height="58" />
  <text x="455" y="110" text-anchor="middle" class="label">Cron / Wake</text>
  <text x="455" y="126" text-anchor="middle" class="small">Scheduled tasks</text>
  <text x="455" y="139" text-anchor="middle" class="small">Heartbeat checks</text>

  <!-- LAYER 2: DATA SOURCES -->
  <rect class="zone" x="30" y="175" width="560" height="130" rx="8" ry="8" />
  <text x="42" y="195" class="zone-label">DATA SOURCES</text>

  <rect class="node external" x="60" y="204" width="170" height="88" />
  <text x="145" y="226" text-anchor="middle" class="label">IBKR Client Portal</text>
  <text x="145" y="242" text-anchor="middle" class="small">Docker · localhost:5000</text>
  <text x="145" y="258" text-anchor="middle" class="small">REST API · OAuth 2.0 JWT</text>
  <text x="145" y="274" text-anchor="middle" class="small">Market data (read-only)</text>

  <rect class="node external" x="250" y="204" width="150" height="88" />
  <text x="325" y="226" text-anchor="middle" class="label">Investing.com</text>
  <text x="325" y="242" text-anchor="middle" class="small">Macro sentiment</text>
  <text x="325" y="258" text-anchor="middle" class="small">7 ETF indices</text>
  <text x="325" y="274" text-anchor="middle" class="small">Yield curve</text>

  <rect class="node external" x="420" y="204" width="150" height="88" />
  <text x="495" y="226" text-anchor="middle" class="label">Google Finance</text>
  <text x="495" y="242" text-anchor="middle" class="small">Analyst ratings</text>
  <text x="495" y="258" text-anchor="middle" class="small">Sector data</text>

  <!-- Arrows: Inputs → Data -->
  <path class="edge" d="M 137,146 L 137,204" marker-end="url(#arrow)" />
  <path class="edge" d="M 301,146 L 325,204" marker-end="url(#arrow)" />
  <path class="edge" d="M 455,146 L 495,204" marker-end="url(#arrow)" />

  <!-- LAYER 3: SCRIPTS -->
  <rect class="zone" x="30" y="320" width="560" height="105" rx="8" ry="8" />
  <text x="42" y="340" class="zone-label">PYTHON SCRIPTS</text>

  <rect class="node process" x="60" y="348" width="120" height="64" />
  <text x="120" y="370" text-anchor="middle" class="mono">ibkr_webapi.py</text>
  <text x="120" y="386" text-anchor="middle" class="small">IBKR REST client</text>
  <text x="120" y="400" text-anchor="middle" class="small">stdlib only</text>

  <rect class="node process" x="200" y="348" width="110" height="64" />
  <text x="255" y="370" text-anchor="middle" class="mono">indicators.py</text>
  <text x="255" y="386" text-anchor="middle" class="small">EMA · RSI · MACD</text>
  <text x="255" y="400" text-anchor="middle" class="small">TRIX · slopes</text>

  <rect class="node process" x="330" y="348" width="120" height="64" />
  <text x="390" y="370" text-anchor="middle" class="mono">macro_pillar.py</text>
  <text x="390" y="386" text-anchor="middle" class="small">7 ETF scoring</text>
  <text x="390" y="400" text-anchor="middle" class="small">Yield curve calc</text>

  <rect class="node process" x="470" y="348" width="100" height="64" />
  <text x="520" y="370" text-anchor="middle" class="mono">score.py</text>
  <text x="520" y="386" text-anchor="middle" class="small">-6 to +6</text>
  <text x="520" y="400" text-anchor="middle" class="small">Cascade logic</text>

  <!-- Arrows: Data → Scripts -->
  <path class="edge" d="M 145,292 L 120,348" marker-end="url(#arrow)" />
  <path class="edge" d="M 325,292 L 390,348" marker-end="url(#arrow)" />
  <path class="edge" d="M 325,292 L 255,348" marker-end="url(#arrow)" />
  <path class="edge" d="M 495,292 L 520,348" marker-end="url(#arrow)" />

  <!-- LAYER 4: THREE PILLARS -->
  <rect class="zone" x="30" y="440" width="560" height="120" rx="8" ry="8" />
  <text x="42" y="460" class="zone-label">THREE-PILLAR ANALYSIS FRAMEWORK</text>

  <rect class="node process" x="60" y="470" width="166" height="78" />
  <text x="143" y="490" text-anchor="middle" class="pillar-title">📈 Pillar 1 · Trend</text>
  <text x="143" y="506" text-anchor="middle" class="pillar-item">EMA 20/50/200 structure</text>
  <text x="143" y="520" text-anchor="middle" class="pillar-item">Price vs EMA</text>
  <text x="143" y="534" text-anchor="middle" class="pillar-item">Long-term slope</text>
  <text x="143" y="548" text-anchor="middle" class="pillar-item">Score: -2 .. +2</text>

  <rect class="node process" x="246" y="470" width="166" height="78" />
  <text x="329" y="490" text-anchor="middle" class="pillar-title">⚡ Pillar 2 · Momentum</text>
  <text x="329" y="506" text-anchor="middle" class="pillar-item">Wilder's RSI-14</text>
  <text x="329" y="520" text-anchor="middle" class="pillar-item">MACD histogram</text>
  <text x="329" y="534" text-anchor="middle" class="pillar-item">TRIX-15 vs signal</text>
  <text x="329" y="548" text-anchor="middle" class="pillar-item">Score: -2 .. +2</text>

  <rect class="node process" x="432" y="470" width="148" height="78" />
  <text x="506" y="490" text-anchor="middle" class="pillar-title">🌐 Pillar 3</text>
  <text x="506" y="506" text-anchor="middle" class="pillar-title">Macro-Sentiment</text>
  <text x="506" y="522" text-anchor="middle" class="pillar-item">7 ETF cross-asset</text>
  <text x="506" y="536" text-anchor="middle" class="pillar-item">Yield curve</text>
  <text x="506" y="550" text-anchor="middle" class="pillar-item">Score: -2 .. +2</text>

  <!-- LAYER 5: COMPOSITE SCORE -->
  <rect class="node storage" x="210" y="578" width="200" height="46" />
  <text x="310" y="601" text-anchor="middle" class="label">COMPOSITE SCORE</text>
  <text x="310" y="617" text-anchor="middle" class="pillar-item">-6 to +6 · weighted cascade</text>

  <path class="edge" d="M 143,548 L 240,578" marker-end="url(#arrow)" />
  <path class="edge" d="M 329,548 L 329,578" marker-end="url(#arrow)" />
  <path class="edge" d="M 506,548 L 380,578" marker-end="url(#arrow)" />

  <!-- LAYER 6: DECISION -->
  <rect class="node neutral" x="180" y="642" width="260" height="46" />
  <text x="310" y="665" text-anchor="middle" class="label">DECISION CASCADE</text>
  <text x="310" y="681" text-anchor="middle" class="pillar-item">Enter → Hold → Exit → Wait</text>

  <path class="edge" d="M 310,624 L 310,642" marker-end="url(#arrow)" />

  <!-- LAYER 7: OUTPUT -->
  <rect class="node input" x="210" y="706" width="200" height="46" />
  <text x="310" y="729" text-anchor="middle" class="label">#trading-signals</text>
  <text x="310" y="745" text-anchor="middle" class="small">Scorecard · Friday HTML review</text>

  <path class="edge" d="M 310,688 L 310,706" marker-end="url(#arrow)" />

  <!-- GUARDRAILS (right column) -->
  <rect class="guard" x="615" y="60" width="280" height="692" rx="10" ry="10" />
  <rect class="zone" x="615" y="60" width="280" height="692" rx="10" ry="10" />
  <text x="755" y="88" text-anchor="middle" class="zone-label">GUARDRAILS</text>

  <rect class="node risk-fill" x="635" y="106" width="240" height="46" />
  <text x="755" y="128" text-anchor="middle" class="label">🔒 Read-Only API</text>
  <text x="755" y="143" text-anchor="middle" class="small">Never places orders. Manual only.</text>

  <rect class="node risk-fill" x="635" y="164" width="240" height="46" />
  <text x="755" y="186" text-anchor="middle" class="label">✅ Explicit Confirmation</text>
  <text x="755" y="201" text-anchor="middle" class="small">Every decision needs user approval.</text>

  <rect class="node risk-fill" x="635" y="222" width="240" height="46" />
  <text x="755" y="244" text-anchor="middle" class="label">📋 Paper Trading Mode</text>
  <text x="755" y="259" text-anchor="middle" class="small">Simulation before any action.</text>

  <rect class="node risk-fill" x="635" y="280" width="240" height="46" />
  <text x="755" y="302" text-anchor="middle" class="label">🛡️ Protected Positions</text>
  <text x="755" y="317" text-anchor="middle" class="small">Stock grants never touched.</text>

  <rect class="node risk-fill" x="635" y="338" width="240" height="46" />
  <text x="755" y="360" text-anchor="middle" class="label">💼 Two-Account Model</text>
  <text x="755" y="375" text-anchor="middle" class="small">Agentic (cash) ≠ Individual (margin)</text>

  <rect class="node risk-fill" x="635" y="396" width="240" height="46" />
  <text x="755" y="418" text-anchor="middle" class="label">📅 T+1 Settling</text>
  <text x="755" y="433" text-anchor="middle" class="small">Cash account rule, always enforced.</text>

  <rect class="node risk-fill" x="635" y="454" width="240" height="46" />
  <text x="755" y="476" text-anchor="middle" class="label">🗂️ Workspace Isolation</text>
  <text x="755" y="491" text-anchor="middle" class="small">Own workspace + shared-memory only.</text>

  <rect class="node risk-fill" x="635" y="512" width="240" height="46" />
  <text x="755" y="534" text-anchor="middle" class="label">🔞 No Polymarket</text>
  <text x="755" y="549" text-anchor="middle" class="small">Prompt injection risk — banned.</text>

  <text x="755" y="594" text-anchor="middle" class="pillar-title">Capital Rotation</text>
  <text x="755" y="610" text-anchor="middle" class="small">Enter on rebound → ride</text>
  <text x="755" y="624" text-anchor="middle" class="small">→ exit on exhaustion</text>
  <text x="755" y="638" text-anchor="middle" class="small">→ wait for next trigger</text>
  <text x="755" y="652" text-anchor="middle" class="small">No large position traps.</text>

  <!-- Legend -->
  <rect x="60" y="758" width="12" height="12" class="input" stroke="var(--line)" stroke-width="1" rx="2" />
  <text x="78" y="768" class="small">Input</text>
  <rect x="140" y="758" width="12" height="12" class="external" stroke="var(--line)" stroke-width="1" rx="2" />
  <text x="158" y="768" class="small">External</text>
  <rect x="230" y="758" width="12" height="12" class="process" stroke="var(--line)" stroke-width="1" rx="2" />
  <text x="248" y="768" class="small">Process</text>
  <rect x="320" y="758" width="12" height="12" class="storage" stroke="var(--line)" stroke-width="1" rx="2" />
  <text x="338" y="768" class="small">Score</text>
  <rect x="410" y="758" width="12" height="12" class="risk-fill" stroke="var(--line)" stroke-width="1" rx="2" />
  <text x="428" y="768" class="small">Guardrail</text>
</svg>
</main>
</body>
</html>
